<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="svg/user.svg" type="image/svg+xml">
</head>

<body>
    <div class="pictures">
        <div class="flower"><img src="svg/flower-1.svg" alt="Flower 1" width="60" height="60"></div>
        <div class="chart"><img src="svg/chart-1.svg" alt="Chart 1" width="70" height="70"></div>
        <div class="pie-chart"><img src="svg/pie-chart-2.svg" alt="Pie Chart 2" width="70" height="70"></div>
        <div class="chart"><img src="svg/chart-2.svg" alt="Chart 2" width="70" height="70"></div>
        <div class="cloud"><img src="svg/cloud.svg" alt="Cloud" width="100" height="100"></div>
        <div class="flower"><img src="svg/flower.svg" alt="Flower" width="190" height="190"></div>
        <div class="circle"><img src="svg/circle.svg" alt="Circle" width="100" height="90"></div>
        <div class="world"><img src="svg/world.svg" alt="World" width="90" height="90"></div>
        <div class="rectangle"><img src="svg/rectangule.svg" alt="Rectangle" width="400" height="400"></div>

        <div class="circles-lines">
            <div class="circle-line"><img src="svg/circle-line.svg" alt="Circle Line 1" width="400" height="400"></div>
            <div class="circle-line"><img src="svg/circle-line.svg" alt="Circle Line 2" width="350" height="350"></div>
            <div class="circle-line"><img src="svg/circle-line.svg" alt="Circle Line 3" width="300" height="300"></div>
        </div>

        <div class="arrow-rectangle"><img src="svg/arrow-rectangule.svg" alt="Arrow Rectangle" width="100" height="100"></div>
        <div class="infinity-loop"><img src="svg/infinity-loop.svg" alt="Infinity Loop" width="100" height="100"></div>
    </div>

    <div class="login-container">
        <div class="icon-user"><img src="svg/user.svg" alt="User Icon" width="190" height="190"></div>
        <div class="usuario-container">Username</div>

        <div class="numbers">
            <div class="number">1</div>
            <div class="number">2</div>
            <div class="number">3</div>
            <div class="number">4</div>
            <div class="number">5</div>
            <div class="number">6</div>
            <div class="number">7</div>
            <div class="number">8</div>
            <div class="number">9</div>
            <div class="number">10</div>
            <div class="number">11</div>
            <div class="number">12</div>
        </div>

        <div class="campos">
            <input type="text" placeholder="Username" class="space-username">
            <input type="password" placeholder="Password" class="space-password">
        </div>

        <div class="register">
            <input type="text" placeholder="Registrar" class="space-register">
            <label class="register-check">Registering</label>
            <div class="loader"></div>
            <div class="boton-register">Login</div>
        </div>

        <div class="remember-login">
            <label class="remember">
                <input type="checkbox">
                Remember You
            </label>
            <div class="boton-login">Login</div>
        </div>

        <div class="graphic">
            <img src="svg/graphic.svg" alt="Graphic" width="100" height="100">
        </div>
        <div class="pie-chart">
            <img src="svg/pie-chart.svg" alt="Pie Chart" width="190" height="100">
        </div>
        <div class="chart">
            <img src="svg/chart.svg" alt="Chart" width="190" height="100">
        </div>
    </div>
</body>

</html>
