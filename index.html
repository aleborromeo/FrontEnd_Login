<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="svg/user.svg" type="image/svg+xml">
</head>

<body>
  <div class="pictures">
    <div class="flower-1">
      <img src="svg/flower-1.svg" height="60" width="60">
    </div>

    <div class="chart-1">
      <img src="svg/chart-1.svg" height="70" width="70">
    </div>

    <div class="pie-chart-2">
      <img src="svg/pie-chart-2.svg" height="70" width="70">
    </div>

    <div class="chart-2">
      <img src="svg/chart-2.svg" height="70" width="70">
    </div>

    <div class="cloud">
      <img src="svg/cloud.svg" height="100" width="100">
    </div>

    <div class="flower">
      <img src="svg/flower.svg" height="190" width="190">
    </div>

    <div class="circle">
      <img src="svg/circle.svg" height="100" width="90">
    </div>

    <div class="world">
      <img src="svg/world.svg" height="90" width="90">
    </div>

    <div class="rectangule">
      <img src="svg/rectangule.svg" height="400" width="400">
    </div>

    <div class="circles-lines">
      <div class="circle-line-1">
        <img src="svg/circle-line.svg" height="400" width="400">
      </div>
      <div class="circle-line-2">
        <img src="svg/circle-line.svg" height="350" width="350">
      </div>
      <div class="circle-line-3">
        <img src="svg/circle-line.svg" height="300" width="300">
      </div>
    </div>

    <div class="arrow-rectangule">
      <img src="svg/arrow-rectangule.svg" height="100" width="100">
    </div>

    <div class="infinity-loop">
      <img src="svg/infinity-loop.svg" height="100" width="100">
    </div>

  </div>

  <div class="login-container">
    <div class="icon-user">
        <img src="svg/user.svg" height="190" width="190">
    </div>
    <div class="usuario-container">Username</div>

    <div class="numbers">
      <div class="number-1">1</div>
      <div class="number-2">2</div>
      <div class="number-3">3</div>
      <div class="number-4">4</div>
      <div class="number-5">4</div>
      <div class="number-6">4</div>
      <div class="number-7">4</div>
      <div class="number-8">4</div>
      <div class="number-9">5</div>
      <div class="number-10">6</div>
      <div class="number-11">6</div>
      <div class="number-12">8</div>
    </div>

    <div class="campos">
      <input type="text" placeholder="Username" class="space-username">
      <input type="password" placeholder="Password" class="space-password">
    </div>

    <div class="register">
      <input typr="text" placeholder="Registrar" class="space-register">
      <div class="load-register">
        <label class="register-check">
          Registering
          </label>
      </div>
      <div class="loader"></div>
      <div class="boton-register">Login</div>

    <div class="remember-login">
      <label class="remember">
        <input type="checkbox">
        Remember You
      </label>
      <div class="boton-login">Login</div>
    </div>

    <div class="graphic">
      <img src="svg/graphic.svg" height="100" width="100">
  </div>
  <div class="pie-chart">
    <img src="svg/pie-chart.svg" height="100" width="190">
</div>
<div class="chart">
  <img src="svg/chart.svg" height="100" width="190">
</div>

</body>
</html>
